name: News Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_ACTIONS: "true"
      RUN_MODE: "oneshot"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      CHANNEL_LINK: ${{ secrets.CHANNEL_LINK }}
      CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
      SEND_TO_CHANNEL: ${{ secrets.SEND_TO_CHANNEL }}
      TIMEZONE: ${{ secrets.TIMEZONE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      gemini_api_key: ${{ secrets.gemini_api_key }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      groq_api_key: ${{ secrets.groq_api_key }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      openrouter_api_key: ${{ secrets.openrouter_api_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run news bot
        run: python main.py
      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_news.json 2>/dev/null || true
          git add news_settings.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git pull --rebase origin main || true
            git push || true
          fi
