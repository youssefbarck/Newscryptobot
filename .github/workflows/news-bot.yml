name: News Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_ACTIONS: "true"
      RUN_MODE: "oneshot"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      CHANNEL_LINK: ${{ secrets.CHANNEL_LINK }}
      CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
      SEND_TO_CHANNEL: ${{ secrets.SEND_TO_CHANNEL }}
      TIMEZONE: ${{ secrets.TIMEZONE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python main.py
            - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_news.json 2>/dev/null || true
          git add news_settings.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git pull --rebase origin main || true
            git push || true
          fi
